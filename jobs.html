<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구인구직 — 포디움</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">포디움<span class="accent">.</span><span class="beta">BETA</span></a>
    <nav class="main-nav">
      <a href="jobs.html" class="active">구인·구직</a>
      <a href="official.html">채용공고</a>
      <a href="practice.html">연습실</a>
      <a href="lessons.html">과외</a>
      <a href="market.html">중고거래</a>
      <a href="#" onclick="alert('커뮤니티는 추후 오픈 예정입니다.'); return false;">커뮤니티 <span class="soon">예정</span></a>
    </nav>
    <div class="header-actions">
      <button class="btn-ghost" onclick="alert('로그인은 프로토타입에서 제공되지 않습니다.')">로그인</button>
    </div>
  </div>
</header>

<div class="page-head">
  <div class="container">
    <h1>구인·구직</h1>
    <p class="desc">객원·대타, 반주, 행사 연주, 강사 — 개인·팀이 직접 올리는 급한 자리. (기관 공식 공고는 <a href="official.html" style="color:var(--gold-light);text-decoration:underline">채용공고</a>에서)</p>
    <div class="tabs">
      <button class="tab active" id="tab-offer">구인</button>
      <button class="tab" id="tab-seek">구직</button>
    </div>
  </div>
</div>

<div class="container board-layout">
  <aside class="filters">
    <div class="filter-group">
      <h4>분야</h4>
      <div class="filter-options" id="filter-cat"></div>
    </div>
    <div class="filter-group">
      <h4>악기군</h4>
      <div class="filter-options" id="filter-inst"></div>
    </div>
    <div class="filter-group">
      <h4>지역</h4>
      <div class="filter-options" id="filter-region"></div>
    </div>
    <button class="filter-reset" id="filter-reset">필터 초기화</button>
  </aside>

  <main>
    <div class="board-toolbar">
      <div class="search-box">
        🔍 <input type="text" id="search-input" placeholder="제목, 악기, 기관명으로 검색">
      </div>
      <button class="btn-primary" id="btn-write">＋ 공고 올리기</button>
    </div>
    <div class="result-count" id="result-count"></div>
    <div class="job-list" id="job-list"></div>
  </main>
</div>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal">
    <button class="modal-close">✕</button>
    <div class="top-row" id="detail-tags"></div>
    <h2 id="detail-title"></h2>
    <dl class="detail-meta" id="detail-meta"></dl>
    <div class="body-text" id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="document.getElementById('detail-modal').classList.remove('open')">닫기</button>
      <button class="btn-primary" onclick="alert('지원/연락 기능은 프로토타입에서 제공되지 않습니다.')">지원하기 / 연락하기</button>
    </div>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-backdrop" id="write-modal">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>공고 올리기</h2>
    <form class="form-grid" id="write-form">
      <div class="form-field">
        <label>구분</label>
        <div class="radio-row">
          <label><input type="radio" name="w-type" value="offer" checked> 구인 (사람을 찾습니다)</label>
          <label><input type="radio" name="w-type" value="seek"> 구직 (자리를 찾습니다)</label>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>분야</label>
          <select name="w-cat" required>
            <option value="객원/대타">객원/대타</option>
            <option value="단원모집">단원모집</option>
            <option value="반주">반주</option>
            <option value="행사연주">행사연주</option>
            <option value="강사/레슨">강사/레슨</option>
            <option value="지휘/음악감독">지휘/음악감독</option>
          </select>
        </div>
        <div class="form-field">
          <label>악기군</label>
          <select name="w-inst" required>
            <option value="현악">현악</option>
            <option value="목관">목관</option>
            <option value="금관">금관</option>
            <option value="타악">타악</option>
            <option value="건반">건반</option>
            <option value="성악">성악</option>
            <option value="지휘">지휘</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>세부 악기 (예: 바이올린)</label>
          <input type="text" name="w-instDetail" placeholder="바이올린">
        </div>
        <div class="form-field">
          <label>지역</label>
          <select name="w-region" required>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
            <option value="인천">인천</option>
            <option value="대전">대전</option>
            <option value="대구">대구</option>
            <option value="부산">부산</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label>제목</label>
        <input type="text" name="w-title" required placeholder="예: 정기연주회 비올라 객원 1명 모십니다">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>기관/팀명 또는 이름</label>
          <input type="text" name="w-org" required placeholder="○○오케스트라">
        </div>
        <div class="form-field">
          <label>보수</label>
          <input type="text" name="w-pay" placeholder="회당 15만원 / 협의">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>마감일</label>
          <input type="date" name="w-deadline">
        </div>
        <div class="form-field" style="display:flex;align-items:flex-end;padding-bottom:6px">
          <label style="display:flex;align-items:center;gap:6px;margin:0;font-weight:400">
            <input type="checkbox" name="w-urgent"> 급구로 표시
          </label>
        </div>
      </div>
      <div class="form-field">
        <label>상세 내용</label>
        <textarea name="w-body" required placeholder="일정, 프로그램, 자격 요건, 연락 방법 등을 적어주세요."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-outline" onclick="document.getElementById('write-modal').classList.remove('open')">취소</button>
        <button type="submit" class="btn-primary">등록하기</button>
      </div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="container">
    <span class="logo serif">포디움<span class="accent">.</span></span><br>
    클래식 음악인을 위한 플랫폼 · 프로토타입 v0.1
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/jobs.js"></script>

</body>
</html>
