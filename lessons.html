<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">포디엄<span class="accent">.</span><span class="beta">BETA</span></a>
    <nav class="main-nav">
      <a href="jobs.html">구인구직</a>
      <a href="practice.html">연습실</a>
      <a href="lessons.html" class="active">과외</a>

</header>

<div class="page-head">
  <div class="container">
    <h1>과외 매칭</h1>
    <p class="desc">사사 라인, 입시 합격 실적, 시범레슨 여부까지 — 레슨 결정에 진짜 필요한 정보로 찾습니다. (목데이터 프로토타입)</p>
    <div class="tabs">
      <button class="tab active" id="tab-teacher">선생님 찾기</button>
      <button class="tab" id="tab-request">학생 레슨 요청</button>
    </div>
  </div>
</div>

<div class="container board-layout">
  <aside class="filters">
    <button class="filter-reset filter-reset-top" id="filter-reset">필터 초기화 ↺</button>
    <div class="filter-group">
      <details open>
        <summary class="filter-summary">악기 (접기/펼치기)</summary>
        <div id="f-inst"></div>
      </details>
    </div>
    <div class="filter-group"><h4>대상</h4><div class="filter-options" id="f-level"></div></div>
    <div class="filter-group"><h4>방식</h4><div class="filter-options" id="f-mode"></div></div>
    <div class="filter-group"><h4>조건</h4><div class="filter-options" id="f-cond"></div></div>
  </aside>
  <main>
    <div class="board-toolbar">
      <div class="search-box"><input type="text" id="search-input" placeholder="악기, 학교, 지역으로 검색"></div>
      <select id="sort-sel" style="border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:0.88rem;background:var(--paper);font-family:inherit">
        <option value="default">최근 등록순</option>
        <option value="reviews">리뷰 많은 순</option>
        <option value="matches">매칭 많은 순</option>
        <option value="priceAsc">가격 낮은순</option>
        <option value="priceDesc">가격 높은순</option>
      </select>
      <button class="btn-primary" id="btn-request">＋ 레슨 요청서</button>
    </div>
    <div class="crawl-note"><span class="dot"></span>요청서 작성, 선생님의 열람·응답 <b>모두 무료</b>입니다 — 견적 비용이 없어요.</div>
    <div class="result-count" id="result-count"></div>
    <div class="job-list" id="list"></div>
  </main>
</div>

<!-- 레슨 요청서 모달 (숨고 벤치마킹: 구조화된 요청 → 선생님이 응답) -->
<div class="modal-backdrop" id="request-modal">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>레슨 요청서 <span style="font-size:0.75rem;color:var(--ink-soft);font-weight:400">(작성·열람·응답 모두 무료)</span></h2>
    <form class="form-grid" id="request-form">
      <div class="form-row">
        <div class="form-field">
          <label>악기</label>
          <select name="q-inst" required id="q-inst"></select>
        </div>
        <div class="form-field">
          <label>대상·레벨</label>
          <select name="q-level" required>
            <option value="취미 (성인/입문)">취미 (성인/입문)</option>
            <option value="취미 (진행 중)">취미 (진행 중)</option>
            <option value="입시 (예중·예고)">입시 (예중·예고)</option>
            <option value="입시 (음대)">입시 (음대)</option>
            <option value="전공 심화">전공 심화</option>
            <option value="유학 준비">유학 준비</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>지역</label>
          <input type="text" name="q-region" required placeholder="예: 분당, 서울 서초구">
        </div>
        <div class="form-field">
          <label>레슨 방식</label>
          <select name="q-mode">
            <option value="스튜디오 방문">스튜디오 방문</option>
            <option value="출강 희망">출강 희망</option>
            <option value="온라인">온라인</option>
            <option value="협의 가능">협의 가능</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>주 횟수</label>
          <select name="q-freq">
            <option value="주 1회">주 1회</option>
            <option value="주 2회">주 2회</option>
            <option value="격주/협의">격주/협의</option>
          </select>
        </div>
        <div class="form-field">
          <label>회당 예산</label>
          <input type="text" name="q-budget" placeholder="예: 8~12만원">
        </div>
      </div>
      <div class="form-field">
        <label>희망 요일·시간</label>
        <input type="text" name="q-time" placeholder="예: 평일 저녁, 주말 오전">
      </div>
      <div class="form-field">
        <label>현재 수준·목표 (선생님이 판단할 수 있게)</label>
        <textarea name="q-note" required placeholder="예: 스즈키 10권 진행 중, 11월 콩쿠르 목표. 자세 교정 위주로 원합니다."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-outline" onclick="document.getElementById('request-modal').classList.remove('open')">취소</button>
        <button type="submit" class="btn-primary">요청서 올리기</button>
      </div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><span class="logo serif">포디엄<span class="accent">.</span></span><br>클래식 음악인을 위한 플랫폼 · 프로토타입 v0.15</div>
</footer>

<script>
// 리서치 반영: 사사·합격실적이 핵심 신뢰 정보, 성악은 반주자 비용 별도, 시범레슨 문화
// 학력·입상 경력은 필수 표기, 사사는 표기하지 않음 (피드백 반영)
const TEACHERS = [
  { inst:"현악", detail:"바이올린", name:"김○○", edu:"서울대 음대 졸 · 독일 뮌헨 국립음대 석사",
    rating:4.9, rcount:38, matches:61, years:12, fastReply:true, verified:true,
    prize:"이화경향 콩쿠르 입상", record:"예원 2명 · 서울예고 3명 · 음대 합격 7명",
    target:["입시","전공심화"], price:"회당 15만원(90분)", priceNum:15,
    region:"서초·강남", mode:["스튜디오","출강"], trial:true, note:"입시 전문. 콩쿠르 지도 경력 10년." },
  { inst:"현악", detail:"첼로", name:"박○○", edu:"한예종 졸",
    rating:4.8, rcount:21, matches:34, years:6, fastReply:true, verified:true,
    prize:"", record:"취미 성인 지도 5년",
    target:["취미","입시"], price:"회당 7만원(60분)", priceNum:7,
    region:"신촌·마포", mode:["스튜디오","온라인"], trial:true, note:"성인 취미 환영. 자세 교정 중심 커리큘럼." },
  { inst:"건반", detail:"피아노", name:"이○○", edu:"연세대 음대 졸 · 미국 이스트만 석사",
    rating:5.0, rcount:52, matches:89, years:15, fastReply:false, verified:true,
    prize:"전국 콩쿠르 입상 다수", record:"음대 합격 12명",
    target:["입시","전공심화"], price:"회당 12만원(60분)", priceNum:12,
    region:"분당·판교", mode:["스튜디오"], trial:false, note:"입시 시즌(9~12월) 대기 있음. 신규는 5월 이전 문의 권장." },
  { inst:"성악", detail:"소프라노", name:"최○○", edu:"서울대 음대 졸 · 이탈리아 밀라노 베르디 국립음악원",
    rating:4.9, rcount:17, matches:25, years:9, fastReply:true, verified:true,
    prize:"이탈리아 국제 콩쿠르 파이널리스트", record:"음대 합격 4명",
    target:["입시","취미"], price:"회당 10만원(60분) + 반주자 별도 3만원", priceNum:10,
    region:"강남·송파", mode:["스튜디오"], trial:true, note:"입시 반주자 상주 스튜디오. 딕션(이탈리아어·독일어) 지도 포함." },
  { inst:"목관", detail:"플루트", name:"정○○", edu:"한양대 음대 졸",
    rating:4.7, rcount:9, matches:14, years:4, fastReply:true, verified:false,
    prize:"", record:"예고 합격 2명",
    target:["취미","입시"], price:"회당 6만원(60분)", priceNum:6,
    region:"노원·강북", mode:["출강","스튜디오"], trial:true, note:"학생 악기 상태 점검·구입 상담도 도와드립니다." },
  { inst:"금관", detail:"호른", name:"강○○", edu:"서울대 음대 졸 · 군악대 전역",
    rating:4.9, rcount:12, matches:19, years:7, fastReply:false, verified:true,
    prize:"전국 관악 콩쿠르 입상", record:"음대 합격 3명",
    target:["입시","전공심화"], price:"회당 8만원(60분)", priceNum:8,
    region:"수원·용인", mode:["출강"], trial:true, note:"앙부슈어 교정 전문." },
  { inst:"현악", detail:"비올라", name:"윤○○", edu:"독일 쾰른 국립음대 디플롬",
    rating:5.0, rcount:11, matches:16, years:8, fastReply:true, verified:true,
    prize:"독일 실내악 콩쿠르 입상", record:"유학 준비 지도 6명(독일 4·오스트리아 2)",
    target:["전공심화","유학준비"], price:"회당 13만원(90분)", priceNum:13,
    region:"서초", mode:["스튜디오","온라인"], trial:false, note:"독일 음대 입시(Aufnahmeprüfung) 레퍼토리·비자 상담 포함." },
  { inst:"건반", detail:"피아노(반주)", name:"한○○", edu:"이화여대 음대 졸",
    rating:4.8, rcount:26, matches:47, years:5, fastReply:true, verified:false,
    prize:"", record:"입시 반주 경력 5년",
    target:["취미"], price:"회당 5만원(60분)", priceNum:5,
    region:"온라인", mode:["온라인"], trial:true, note:"성인 취미·유튜브 촬영용 코칭. 비대면 전문." },
];
const REQUESTS = [
  { inst:"현악", detail:"바이올린", title:"예고 입시 준비 중3, 주 2회 레슨 선생님 찾습니다", region:"분당", budget:"회당 10~15만", mode:"스튜디오 방문 가능", note:"현재 스즈키 10권 수준. 11월 콩쿠르 목표." },
  { inst:"성악", detail:"테너", title:"음대 편입 준비 성악 레슨 (반주자 포함 희망)", region:"서울 전역", budget:"회당 12만 이하", mode:"출강 희망", note:"직장인이라 평일 저녁·주말만 가능합니다." },
  { inst:"목관", detail:"클라리넷", title:"성인 취미 클라리넷 기초부터", region:"일산", budget:"회당 5~6만", mode:"출강/스튜디오 무관", note:"악기 구입 전이라 상담부터 부탁드려요." },
  { inst:"건반", detail:"피아노", title:"초5 콩쿠르 준비 레슨", region:"강남", budget:"회당 8~12만", mode:"스튜디오", note:"체르니 40 진행 중. 금호영재 목표." },
];

// 악기는 세부 단위로 — 바이올린 선생님이 비올라를 가르칠 수는 없으니까
const INST_GROUPS=[
  ["현악",["바이올린","비올라","첼로","더블베이스","하프"]],
  ["목관",["플루트","오보에","클라리넷","바순"]],
  ["금관",["호른","트럼펫","트롬본","튜바"]],
  ["기타",["타악","피아노"]],
  ["성악",["소프라노","메조소프라노","알토","테너","바리톤","베이스"]],
];
const LEVELS=["취미","입시","전공심화","유학준비"];
const MODES=["스튜디오","출강","온라인"];
const CONDS=["시범레슨 가능"];
const st={tab:"teacher",inst:new Set(),level:new Set(),mode:new Set(),cond:new Set(),q:"",sort:"default"};
const $=s=>document.querySelector(s);

function chips(id,items,set){const el=$(id);el.innerHTML=items.map(v=>`<button class="chip${set.has(v)?" on":""}" data-v="${v}">${v}</button>`).join("");
  el.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{const v=c.dataset.v;set.has(v)?set.delete(v):set.add(v);render();}));}

function instChips(){
  const el=$("#f-inst");
  el.innerHTML=INST_GROUPS.map(([g,list])=>`
    <div class="inst-group"><span class="inst-group-label">${g}</span>
      ${list.map(v=>`<button class="chip${st.inst.has(v)?" on":""}" data-v="${v}">${v}</button>`).join("")}
    </div>`).join("");
  el.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{const v=c.dataset.v;st.inst.has(v)?st.inst.delete(v):st.inst.add(v);render();}));
}
// 세부 악기 매칭: "피아노(반주)"는 "피아노" 칩에 매칭
const instMatch=(detail,set)=>[...set].some(v=>detail.startsWith(v)||detail===v);

function render(){
  instChips();chips("#f-level",LEVELS,st.level);chips("#f-mode",MODES,st.mode);chips("#f-cond",CONDS,st.cond);
  $("#tab-teacher").classList.toggle("active",st.tab==="teacher");
  $("#tab-request").classList.toggle("active",st.tab==="request");
  const q=st.q.toLowerCase();
  let html="";
  if(st.tab==="teacher"){
    const list=TEACHERS.filter(t=>{
      if(st.inst.size&&!instMatch(t.detail,st.inst))return false;
      if(st.level.size&&![...st.level].some(l=>t.target.includes(l)))return false;
      if(st.mode.size&&![...st.mode].some(m=>t.mode.includes(m)))return false;
      if(st.cond.has("시범레슨 가능")&&!t.trial)return false;
      if(q&&!`${t.detail} ${t.edu} ${t.region} ${t.note}`.toLowerCase().includes(q))return false;
      return true;
    });
    if(st.sort==="priceAsc")list.sort((a,b)=>a.priceNum-b.priceNum);
    else if(st.sort==="priceDesc")list.sort((a,b)=>b.priceNum-a.priceNum);
    else if(st.sort==="reviews")list.sort((a,b)=>b.rcount-a.rcount);
    else if(st.sort==="matches")list.sort((a,b)=>b.matches-a.matches);
    $("#result-count").innerHTML=`선생님 <strong>${list.length}</strong>명 · ${{default:"최근 등록순",priceAsc:"가격 낮은순",priceDesc:"가격 높은순"}[st.sort]}`;
    html=list.map(t=>`
      <article class="job-card">
        <div class="top-row">
          <span class="tag inst">${t.detail}</span>
          ${t.target.map(x=>`<span class="tag cat">${x}</span>`).join("")}
          ${t.trial?`<span class="tag ok">시범레슨</span>`:""}
          ${t.fastReply?`<span class="tag ok">⚡ 로켓응답</span>`:""}
          ${t.verified?`<span class="tag inst">🎓 학력인증</span>`:""}
          ${t.mode.map(m=>`<span class="tag pos">${m}</span>`).join("")}
        </div>
        <h3>${t.detail} · ${t.name} 선생님 <span style="font-weight:400;font-size:0.85rem;color:var(--ink-soft)">${t.region}</span></h3>
        <div style="font-size:0.82rem;color:var(--ink);margin-top:2px">⭐ <b>${t.rating}</b> (리뷰 ${t.rcount}) · 매칭 <b>${t.matches}회</b> · 경력 ${t.years}년</div>
        <div class="cred"><b>${t.edu}</b>${t.prize?`<br>🏆 ${t.prize}`:""}<br><span style="font-size:0.76rem;opacity:0.85">지도 실적: ${t.record}</span></div>
        <div class="price-line">${t.price}</div>
        <div class="source-line"><span>${t.note}</span></div>
      </article>`).join("");
  } else {
    const list=REQUESTS.filter(r=>{
      if(st.inst.size&&!instMatch(r.detail,st.inst))return false;
      if(q&&!`${r.detail} ${r.title} ${r.region}`.toLowerCase().includes(q))return false;
      return true;
    });
    $("#result-count").innerHTML=`레슨 요청 <strong>${list.length}</strong>건`;
    html=list.map(r=>`
      <article class="job-card">
        <div class="top-row"><span class="tag inst">${r.detail}</span><span class="tag cat">학생 요청</span></div>
        <h3>${r.title}</h3>
        <div class="meta"><span>${r.region}</span><span class="pay">${r.budget}</span><span>${r.mode}</span></div>
        <div class="source-line"><span>${r.note}</span></div>
      </article>`).join("");
  }
  $("#list").innerHTML=html||`<div class="empty">조건에 맞는 결과가 없습니다.</div>`;
}

document.addEventListener("DOMContentLoaded",()=>{
  render();
  $("#tab-teacher").addEventListener("click",()=>{st.tab="teacher";render();});
  $("#tab-request").addEventListener("click",()=>{st.tab="request";render();});
  $("#search-input").addEventListener("input",e=>{st.q=e.target.value.trim();render();});
  $("#sort-sel").addEventListener("change",e=>{st.sort=e.target.value;render();});
  // 레슨 요청서
  const D2G={}; INST_GROUPS.forEach(([g,list])=>list.forEach(d=>D2G[d]=g));
  $("#q-inst").innerHTML=INST_GROUPS.map(([g,list])=>
    `<optgroup label="${g}">${list.map(d=>`<option value="${d}">${d}</option>`).join("")}</optgroup>`).join("");
  const reqModal=$("#request-modal");
  $("#btn-request").addEventListener("click",()=>reqModal.classList.add("open"));
  reqModal.addEventListener("click",e=>{if(e.target===reqModal)reqModal.classList.remove("open");});
  reqModal.querySelector(".modal-close").addEventListener("click",()=>reqModal.classList.remove("open"));
  $("#request-form").addEventListener("submit",e=>{
    e.preventDefault();
    const f=e.target;
    const detail=f.elements["q-inst"].value;
    REQUESTS.unshift({
      inst:D2G[detail]||"기타", detail,
      title:`${f.elements["q-level"].value} ${detail} 레슨 선생님 찾습니다 (${f.elements["q-freq"].value})`,
      region:f.elements["q-region"].value,
      budget:f.elements["q-budget"].value?`회당 ${f.elements["q-budget"].value}`:"예산 협의",
      mode:`${f.elements["q-mode"].value}${f.elements["q-time"].value?` · ${f.elements["q-time"].value}`:""}`,
      note:f.elements["q-note"].value
    });
    f.reset(); reqModal.classList.remove("open");
    st.tab="request"; render();
  });
  $("#filter-reset").addEventListener("click",()=>{st.inst.clear();st.level.clear();st.mode.clear();st.cond.clear();st.q="";st.sort="default";$("#sort-sel").value="default";$("#search-input").value="";render();});
});
</script>
</body>
</html>
