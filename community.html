<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 — 포디엄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Cormorant:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/style.css?v=9">
  <style>
    .post-body { white-space:pre-wrap; line-height:1.7; font-size:0.92rem; color:var(--ink); margin:12px 0 18px; }
    .cmt { border-top:1px solid var(--line); padding:10px 2px; font-size:0.88rem; }
    .cmt .who { font-weight:600; color:var(--navy); margin-right:8px; }
    .cmt .when { font-size:0.75rem; color:var(--ink-soft); }
    .cmt-form { display:flex; gap:8px; margin-top:12px; }
    .cmt-form input[type=text] { flex:1; }
    .hot { color:var(--red); font-weight:700; font-size:0.78rem; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo">포디엄<span class="accent">.</span><span class="beta">BETA</span></a>
    <nav class="main-nav">
      <a href="jobs.html">구인구직</a>
      <a href="practice.html">연습실</a>
      <a href="lessons.html">과외</a>
      <a href="market.html">중고거래</a>
      <a href="community.html" class="active">커뮤니티</a>
    </nav>
    <div class="header-actions">
      <button class="btn-ghost" onclick="alert('로그인은 프로토타입에서 제공되지 않습니다.')">로그인</button>
    </div>
  </div>
</header>

<div class="page-head">
  <div class="container">
    <h1>커뮤니티</h1>
    <p class="desc">오디션 후기, 진로 고민, 레퍼토리 얘기 — 클래식 하는 사람들끼리. <span style="color:var(--ink-soft)">(초안 · 예시 게시글 포함)</span></p>
    <div class="tabs"><button class="tab active">전체 게시판</button></div>
  </div>
</div>

<div class="container">
  <div class="sample-banner">옅게 표시된 글은 <b>예시</b>입니다 — 어떤 대화가 오가는 공간인지 보여드리기 위한 것. 글쓰기는 바로 가능해요 (이 기기에 저장됩니다).</div>
</div>

<div class="container board-layout">
  <aside class="filters">
    <button class="filter-reset filter-reset-top" id="filter-reset">필터 초기화 ↺</button>
    <div class="filter-group"><h4>게시판</h4><div class="filter-options" id="f-cat"></div></div>
    <div class="filter-group"><h4>정렬</h4><div class="filter-options" id="f-sort"></div></div>
  </aside>
  <main>
    <div class="board-toolbar">
      <div class="search-box"><input type="text" id="search-input" placeholder="제목, 내용, 닉네임으로 검색"></div>
      <button class="btn-primary" id="btn-write">글쓰기 ✎</button>
    </div>
    <div class="result-count" id="result-count"></div>
    <div class="job-list" id="list"></div>
  </main>
</div>

<!-- 글 상세 모달 -->
<div class="modal-backdrop" id="post-modal">
  <div class="modal">
    <button class="modal-close">✕</button>
    <div class="top-row" id="pv-tags"></div>
    <h2 id="pv-title"></h2>
    <div class="meta" id="pv-meta" style="margin-bottom:4px"></div>
    <div class="post-body" id="pv-body"></div>
    <h3 style="font-size:0.92rem;color:var(--navy);margin:10px 0 2px">댓글 <span id="pv-cmt-count"></span></h3>
    <div id="pv-comments"></div>
    <div class="cmt-form">
      <input type="text" id="cmt-nick" placeholder="닉네임" style="max-width:110px">
      <input type="text" id="cmt-text" placeholder="댓글을 남겨보세요">
      <button class="btn-outline" id="cmt-add">등록</button>
    </div>
    <div class="modal-actions" id="pv-actions" style="margin-top:14px"></div>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-backdrop" id="write-modal">
  <div class="modal">
    <button class="modal-close">✕</button>
    <h2>글쓰기</h2>
    <form class="form-grid" id="write-form">
      <div class="form-row">
        <div class="form-field">
          <label>게시판</label>
          <select name="w-cat" required>
            <option value="자유">자유</option>
            <option value="정보·팁">정보·팁</option>
            <option value="오디션·콩쿠르 후기">오디션·콩쿠르 후기</option>
            <option value="진로·유학">진로·유학</option>
            <option value="악기·장비">악기·장비</option>
            <option value="레퍼토리·연습">레퍼토리·연습</option>
          </select>
        </div>
        <div class="form-field">
          <label>닉네임</label>
          <input type="text" name="w-nick" required maxlength="12" placeholder="예: 비올라먼지">
        </div>
      </div>
      <div class="form-field">
        <label>제목</label>
        <input type="text" name="w-title" required maxlength="60" placeholder="제목">
      </div>
      <div class="form-field">
        <label>내용</label>
        <textarea name="w-body" required rows="7" placeholder="내용을 적어주세요. 특정인 비방·개인정보·광고는 삭제될 수 있어요."></textarea>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">등록</button>
      </div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><span class="logo serif">포디엄<span class="accent">.</span></span><br>클래식 음악인을 위한 플랫폼 · 프로토타입 v0.15</div>
</footer>

<a class="feedback-fab" href="mailto:ohmjin3141@naver.com?subject=%ED%8F%AC%EB%94%94%EC%97%84%20%EC%BB%A4%EB%AE%A4%EB%8B%88%ED%8B%B0%20%ED%94%BC%EB%93%9C%EB%B0%B1">피드백 보내기</a>

<script>
// 커뮤니티 초안 — 예시글(sample:true)은 옅게 표시, 사용자 글·댓글은 localStorage(이 기기).
// 실서비스 전 필요한 것: 공유 백엔드, 신고/블라인드, 닉네임 중복 처리.
const CATS = ["자유", "정보·팁", "오디션·콩쿠르 후기", "진로·유학", "악기·장비", "레퍼토리·연습"];
const CAT_CLS = { "자유":"cat", "정보·팁":"dd-open", "오디션·콩쿠르 후기":"pos", "진로·유학":"inst", "악기·장비":"src-official", "레퍼토리·연습":"cat" };
const SORTS = ["최신순", "댓글순"];

// 예시 게시글 — 실제 올라올 법한 대화의 톤을 보여주는 용도 (실데이터 아님)
const SAMPLES = [
  { id:"s1", cat:"오디션·콩쿠르 후기", nick:"제2바이올린", when:"2026-07-10",
    title:"시향 객원 오디션 처음 봤는데 후기 (지정곡 준비 팁)",
    body:"악장 발췌 3개 + 협주곡 1악장이었어요.\n대기실에서 30분 정도 기다렸고, 커튼 뒤 블라인드로 진행.\n\n팁이라면 — 발췌는 템포 지시를 정말 그대로 지키는 게 중요했던 것 같아요. 저는 브람스 발췌에서 루바토를 살짝 넣었다가 다시 하라는 요청 받았습니다.\n다들 화이팅.",
    cmts:[ {who:"콘바속불", when:"2026-07-10", text:"블라인드면 발소리도 조심해야 한다던데 진짜인가요?"},
           {who:"제2바이올린", when:"2026-07-11", text:"신발 얘기 진짜예요. 구두 소리 나면 성별 유추된다고 슬리퍼 주는 데도 있어요."} ] },
  { id:"s2", cat:"진로·유학", nick:"고민많은성악", when:"2026-07-08",
    title:"석사 유학 vs 국내 대학원 + 레슨 병행, 어떻게 정하셨나요",
    body:"성악 학부 졸업반입니다. 독일 유학을 알아보고 있는데 비용이 만만치 않고, 국내 대학원 다니면서 입시 레슨으로 벌이를 만드는 선배들도 많더라고요.\n둘 다 해보신 분들 경험담이 궁금합니다.",
    cmts:[ {who:"베를린5년차", when:"2026-07-09", text:"독일은 학비보다 생활비+오디션 이동비가 진짜 큽니다. 그래도 극장 오디션 기회 자체는 확실히 많아요."} ] },
  { id:"s3", cat:"악기·장비", nick:"리드깎는밤", when:"2026-07-05",
    title:"오보에 리드 자작하시는 분들, 케인 어디서 사세요?",
    body:"수입사 통해서만 사다가 최근에 직구를 알아보고 있는데, 관세 포함하면 큰 차이가 없는 것 같기도 하고... 요즘 시세 공유해요.",
    cmts:[] },
  { id:"s4", cat:"정보·팁", nick:"반주자J", when:"2026-07-03",
    title:"교회 반주 페이 협의할 때 확인할 것들 (정리)",
    body:"몇 년 하면서 정리한 체크리스트입니다.\n\n1. 주일 예배 횟수 (1부만인지, 1·2·3부 전부인지)\n2. 수요·금요 예배 포함 여부\n3. 성가대 연습 별도인지\n4. 절기(부활절·성탄) 칸타타 추가 수당\n5. 악보 준비 주체\n\n이거 안 정하고 시작하면 나중에 서로 얼굴 붉힙니다.",
    cmts:[ {who:"주일알토", when:"2026-07-04", text:"5번 진짜 공감... 카피 비용까지 반주자한테 넘기는 데 많아요."} ] },
];

const LS_POSTS = "podium_community_posts_v1";
const LS_CMTS  = "podium_community_cmts_v1";
const $ = s => document.querySelector(s);
const load = (k,d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch(e){ return d; } };
const save = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };

let USER_POSTS = load(LS_POSTS, []);          // [{id,cat,nick,when,title,body,mine:true}]
let USER_CMTS  = load(LS_CMTS, {});           // { postId: [{who,when,text}] }
const st = { cat:new Set(), sort:"최신순", q:"" };

function chips(sel, items, set){ const el=$(sel); el.innerHTML=items.map(v=>`<button class="chip${set.has(v)?" on":""}" data-v="${v}">${v}</button>`).join("");
  el.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{const v=c.dataset.v;set.has(v)?set.delete(v):set.add(v);render();})); }
function sortChips(){ const el=$("#f-sort"); el.innerHTML=SORTS.map(v=>`<button class="chip${st.sort===v?" on":""}" data-v="${v}">${v}</button>`).join("");
  el.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{st.sort=c.dataset.v;render();})); }

const cmtsOf = p => (p.sample ? (p.cmts||[]) : []).concat(USER_CMTS[p.id]||[]);

function allPosts(){
  const samples = SAMPLES.map(p=>({ ...p, sample:true }));
  return [...USER_POSTS.map(p=>({ ...p })), ...samples];
}

function render(){
  chips("#f-cat", CATS, st.cat); sortChips();
  const q = st.q.toLowerCase();
  let list = allPosts().filter(p=>{
    if (st.cat.size && !st.cat.has(p.cat)) return false;
    if (q && !`${p.title} ${p.body} ${p.nick}`.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=> st.sort==="댓글순"
    ? cmtsOf(b).length - cmtsOf(a).length || (b.when||"").localeCompare(a.when||"")
    : (b.when||"").localeCompare(a.when||""));
  $("#result-count").innerHTML = `총 <strong>${list.length}</strong>개의 글`;
  $("#list").innerHTML = list.length ? list.map(p=>{
    const n = cmtsOf(p).length;
    return `
    <article class="job-card${p.sample?" is-sample":""}" data-id="${p.id}">
      <div class="top-row">
        ${p.sample?`<span class="tag sample">예시</span>`:""}
        ${p.mine?`<span class="tag pos">내 글</span>`:""}
        <span class="tag ${CAT_CLS[p.cat]||"cat"}">${p.cat}</span>
        ${n>=2?`<span class="hot">💬 활발</span>`:""}
      </div>
      <h3>${esc(p.title)}</h3>
      <div class="meta"><span>${esc(p.nick)}</span><span>${p.when}</span><span>댓글 ${n}</span></div>
      <div class="source-line"><span>${esc(p.body).slice(0,80)}${p.body.length>80?"…":""}</span></div>
    </article>`;}).join("") : `<div class="empty">조건에 맞는 글이 없습니다.</div>`;
  document.querySelectorAll("#list .job-card").forEach(card=>{
    card.addEventListener("click",()=>openPost(card.dataset.id));
  });
}

function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

let CURRENT = null;
function openPost(id){
  const p = allPosts().find(x=>String(x.id)===String(id));
  if (!p) return;
  CURRENT = p;
  $("#pv-tags").innerHTML = `${p.sample?`<span class="tag sample">예시</span>`:""}${p.mine?`<span class="tag pos">내 글</span>`:""}<span class="tag ${CAT_CLS[p.cat]||"cat"}">${p.cat}</span>`;
  $("#pv-title").textContent = p.title;
  $("#pv-meta").innerHTML = `<span>${esc(p.nick)}</span><span>${p.when}</span>`;
  $("#pv-body").textContent = p.body;
  renderCmts();
  $("#pv-actions").innerHTML = p.mine ? `<button class="btn-outline" id="btn-del">이 글 삭제</button>` : "";
  const del = $("#btn-del");
  if (del) del.addEventListener("click", ()=>{
    if (!confirm("이 글을 삭제할까요?")) return;
    USER_POSTS = USER_POSTS.filter(x=>x.id!==p.id);
    delete USER_CMTS[p.id];
    save(LS_POSTS, USER_POSTS); save(LS_CMTS, USER_CMTS);
    $("#post-modal").classList.remove("open");
    render();
  });
  $("#post-modal").classList.add("open");
}

function renderCmts(){
  const list = cmtsOf(CURRENT);
  $("#pv-cmt-count").textContent = list.length;
  $("#pv-comments").innerHTML = list.map(c=>`
    <div class="cmt"><span class="who">${esc(c.who)}</span>${esc(c.text)} <span class="when">${c.when}</span></div>`).join("")
    || `<div class="cmt" style="color:var(--ink-soft)">첫 댓글을 남겨보세요.</div>`;
}

document.addEventListener("DOMContentLoaded", ()=>{
  render();
  $("#search-input").addEventListener("input", e=>{ st.q=e.target.value.trim(); render(); });
  $("#filter-reset").addEventListener("click", ()=>{ st.cat.clear(); st.sort="최신순"; st.q=""; $("#search-input").value=""; render(); });

  // 모달 공통 닫기
  for (const mid of ["post-modal","write-modal"]){
    const m = document.getElementById(mid);
    m.addEventListener("click", e=>{ if(e.target===m) m.classList.remove("open"); });
    m.querySelector(".modal-close").addEventListener("click", ()=>m.classList.remove("open"));
  }

  // 글쓰기
  $("#btn-write").addEventListener("click", ()=>$("#write-modal").classList.add("open"));
  $("#write-form").addEventListener("submit", e=>{
    e.preventDefault();
    const f = e.target, v = n => f.elements[n].value.trim();
    const post = { id:"u"+Date.now(), cat:v("w-cat"), nick:v("w-nick"), title:v("w-title"), body:v("w-body"),
                   when:new Date().toISOString().slice(0,10), mine:true };
    USER_POSTS.unshift(post); save(LS_POSTS, USER_POSTS);
    f.reset(); $("#write-modal").classList.remove("open"); render();
  });

  // 댓글 등록 (예시글에도 달 수 있음 — 이 기기에만 저장)
  $("#cmt-add").addEventListener("click", ()=>{
    const who = $("#cmt-nick").value.trim() || "익명";
    const text = $("#cmt-text").value.trim();
    if (!text || !CURRENT) return;
    (USER_CMTS[CURRENT.id] = USER_CMTS[CURRENT.id]||[]).push({ who, text, when:new Date().toISOString().slice(0,10) });
    save(LS_CMTS, USER_CMTS);
    $("#cmt-text").value = "";
    renderCmts(); render();
  });
  $("#cmt-text").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); $("#cmt-add").click(); } });
});
</script>
</body>
</html>
